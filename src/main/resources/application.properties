# ==============================
# APPLICATION
# ==============================
spring.application.name=internova-api

# Server configuration
server.port=8080

# ==============================
# DATABASE (Railway PostgreSQL)
# ==============================
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ==============================
# JPA / HIBERNATE
# ==============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ==============================
# JWT SECURITY
# ==============================
internova.security.jwt-secret=${JWT_SECRET}
internova.security.jwt-expiration-ms=86400000

# ==============================
# LOGBOOK SETTINGS
# ==============================
internova.logbook.submission-window-hours=48

# ==============================
# INTERNAL SERVICES
# ==============================
internova.brain.url=${BRAIN_URL}
internova.webhook.secret=${WEBHOOK_SECRET}

# ==============================
# FILE STORAGE
# ==============================
internova.storage.upload-dir=uploads
internova.storage.public-base-url=${PUBLIC_BASE_URL}

# ==============================
# FRONTEND (CORS)
# ==============================
internova.frontend.url=${FRONTEND_URL}