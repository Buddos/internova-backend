# ==============================
# DATABASE (Supabase PostgreSQL with POOLER)
# ==============================
# REPLACE the direct connection with the POOLER URL
# Get this from Supabase Dashboard → Connect → Session pooler
# The format should be: jdbc:postgresql://aws-0-[region].pooler.supabase.com:5432/postgres?sslmode=require
spring.datasource.url=jdbc:postgresql://aws-0-us-west-1.pooler.supabase.com:5432/postgres?sslmode=require

# These stay the same
spring.datasource.username=postgres.ignktnlegjtrmwkeqjmt
spring.datasource.password=Winnerbonnie@2004
spring.datasource.driver-class-name=org.postgresql.Driver

# ==============================
# HIKARICP - ADD THESE STABILITY SETTINGS
# ==============================
# Test connections before use (prevents "Connection is closed" errors)
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.connection-timeout=30000
# Increase max lifetime to 30 minutes (was 600000 = 10 minutes)
spring.datasource.hikari.max-lifetime=1800000
# Add idle timeout
spring.datasource.hikari.idle-timeout=600000
# Add validation timeout
spring.datasource.hikari.validation-timeout=5000
# Add minimum idle connections
spring.datasource.hikari.minimum-idle=2
# Add leak detection
spring.datasource.hikari.leak-detection-threshold=60000

# ==============================
# JPA / HIBERNATE
# ==============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# Remove this - it's deprecated and causing warnings
# spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# Replace with this if you need to specify it
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
# Fix the deprecated property
spring.jpa.properties.hibernate.boot.allow_jdbc_metadata_access=true

